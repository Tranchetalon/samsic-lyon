<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMSIC SÉCURITÉ - Agence de Lyon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login Form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 20px;
        }

        .login-title {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-group input.error {
            border-color: #e74c3c;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .signup-link {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .signup-link a {
            color: #3498db;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Main Dashboard */
        .dashboard {
            display: none;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-logo {
            max-width: 80px;
            height: auto;
            margin-right: 20px;
            border-radius: 5px;
        }

        .header-title {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 700;
        }

        .header-subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            color: #2c3e50;
            font-weight: 500;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .breadcrumb {
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .breadcrumb a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .content-area {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        .page-title {
            color: #2c3e50;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .theme-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            border: 2px solid transparent;
        }

        .theme-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .theme-card.add-theme {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .theme-card.add-theme:hover {
            border-color: #fff;
        }

        .theme-emoji {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .theme-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .theme-card.add-theme .theme-title {
            color: white;
        }

        .theme-description {
            color: #7f8c8d;
            font-size: 14px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 2px solid #ecf0f1;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .link-emoji {
            font-size: 32px;
            margin-right: 15px;
        }

        .link-info {
            flex-grow: 1;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .link-type {
            font-size: 12px;
            color: #7f8c8d;
            background: #ecf0f1;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .back-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #7f8c8d;
        }

        .add-link-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin: 20px 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-link-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
            margin-top: -10px;
        }

        .close:hover {
            color: #000;
        }

        .modal .form-group input, .modal .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }

        .modal-btn:hover {
            background: #2980b9;
        }

        .cancel-btn {
            background: #95a5a6;
        }

        .cancel-btn:hover {
            background: #7f8c8d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .themes-grid {
                grid-template-columns: 1fr;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .header-left {
                flex-direction: column;
            }
        }

        .hidden {
            display: none !important;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            max-width: 300px;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .notification.success {
            background: #2ecc71;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .notification.error {
            background: #e74c3c;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-form">
            <div class="logo-container">
                <img src="https://www.agoramanagers-events.com/wp-content/uploads/importedmedia/partenaires/partenaire-9889.png" alt="SAMSIC Logo" class="logo">
            </div>
            <h1 class="login-title">Connexion</h1>
            <p class="login-subtitle">Accès sécurisé à l'agence de Lyon</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Se connecter</button>
            </form>
            <div class="signup-link">
                <p>Pas encore de compte ? <a href="#" id="showSignup">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <!-- Signup Page -->
    <div id="signupPage" class="login-container hidden">
        <div class="login-form">
            <div class="logo-container">
                <img src="https://www.agoramanagers-events.com/wp-content/uploads/importedmedia/partenaires/partenaire-9889.png" alt="SAMSIC Logo" class="logo">
            </div>
            <h1 class="login-title">Créer un compte</h1>
            <p class="login-subtitle">Rejoindre l'équipe SAMSIC Lyon</p>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" name="signupEmail" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Mot de passe</label>
                    <input type="password" id="signupPassword" name="signupPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="fullName">Nom complet</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <button type="submit" class="login-btn" id="signupBtn">Créer le compte</button>
            </form>
            <div class="signup-link">
                <p>Déjà un compte ? <a href="#" id="showLogin">Se connecter</a></p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <img src="https://www.agoramanagers-events.com/wp-content/uploads/importedmedia/partenaires/partenaire-9889.png" alt="SAMSIC Logo" class="header-logo">
                    <div>
                        <h1 class="header-title" id="headerTitle">SAMSIC SÉCURITÉ</h1>
                        <p class="header-subtitle">Agence de Lyon</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info" id="userInfo">👤 Chargement...</div>
                    <button class="logout-btn" onclick="logout()">Déconnexion</button>
                </div>
            </div>

            <div id="breadcrumb" class="breadcrumb hidden">
                <span id="breadcrumbContent"></span>
            </div>

            <div class="content-area">
                <!-- Home Page -->
                <div id="homePage">
                    <h2 class="page-title">Tableau de Bord Principal</h2>
                    <div class="themes-grid" id="themesGrid">
                        <!-- Themes will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Theme Pages -->
                <div id="themePage" class="hidden">
                    <button class="back-btn" onclick="showHome()">← Retour à l'accueil</button>
                    <h2 class="page-title" id="themePageTitle"></h2>
                    <button class="add-link-btn" onclick="showAddLinkModal()">
                        ➕ Ajouter un nouveau lien
                    </button>
                    <div class="links-grid" id="linksGrid">
                        <!-- Links will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Theme Modal -->
    <div id="addThemeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addThemeModal')">&times;</span>
            <h3 class="modal-title">Ajouter un nouveau thème</h3>
            <form id="addThemeForm">
                <div class="form-group">
                    <label for="themeEmoji">Emoji</label>
                    <input type="text" id="themeEmoji" name="themeEmoji" placeholder="📁" required>
                </div>
                <div class="form-group">
                    <label for="themeName">Nom du thème</label>
                    <input type="text" id="themeName" name="themeName" placeholder="Nouveau thème" required>
                </div>
                <div class="form-group">
                    <label for="themeDescription">Description</label>
                    <input type="text" id="themeDescription" name="themeDescription" placeholder="Description du thème">
                </div>
                <button type="submit" class="modal-btn">Ajouter</button>
                <button type="button" class="modal-btn cancel-btn" onclick="closeModal('addThemeModal')">Annuler</button>
            </form>
        </div>
    </div>

    <!-- Add Link Modal -->
    <div id="addLinkModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addLinkModal')">&times;</span>
            <h3 class="modal-title">Ajouter un nouveau lien</h3>
            <form id="addLinkForm">
                <div class="form-group">
                    <label for="linkEmoji">Emoji</label>
                    <input type="text" id="linkEmoji" name="linkEmoji" placeholder="📄" required>
                </div>
                <div class="form-group">
                    <label for="linkTitle">Titre</label>
                    <input type="text" id="linkTitle" name="linkTitle" placeholder="Nom du document" required>
                </div>
                <div class="form-group">
                    <label for="linkUrl">Lien Google Drive</label>
                    <input type="url" id="linkUrl" name="linkUrl" placeholder="https://drive.google.com/..." required>
                </div>
                <div class="form-group">
                    <label for="linkType">Type</label>
                    <select id="linkType" name="linkType" required>
                        <option value="dossier">Dossier</option>
                        <option value="document">Document</option>
                        <option value="fichier">Fichier</option>
                    </select>
                </div>
                <button type="submit" class="modal-btn">Ajouter</button>
                <button type="button" class="modal-btn cancel-btn" onclick="closeModal('addLinkModal')">Annuler</button>
            </form>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://jyriyfakqbgpqtdxnzpz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cml5ZmFrcWJncHF0ZHhuenB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAxNjQ5MTgsImV4cCI6MjA2NTc0MDkxOH0.daVcvdk2IbyCWNQsLrM2CvVBgJdkAcEWS7iNsa939W4';

        // Initialiser Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // État de l'application
        let currentUser = null;
        let currentTheme = null;
        let themes = [];
        let links = {};

        // Fonctions utilitaires
        function showNotification(message, type = 'success') {
            // Supprimer les notifications existantes
            const existingNotifications = document.querySelectorAll('.notification');
            existingNotifications.forEach(notification => notification.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Déclencher l'animation
            setTimeout(() => notification.classList.add('show'), 100);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, type === 'error' ? 5000 : 3000);
        }

        function setLoading(element, isLoading) {
            if (isLoading) {
                element.disabled = true;
                element.innerHTML = '<span class="spinner"></span>' + element.textContent;
                element.classList.add('loading');
            } else {
                element.disabled = false;
                element.innerHTML = element.textContent.replace('', '');
                element.classList.remove('loading');
            }
        }

        // Fonctions d'authentification
        async function login(email, password) {
            const loginBtn = document.getElementById('loginBtn');
            setLoading(loginBtn, true);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw error;
                }

                currentUser = data.user;
                await loadUserProfile();
                showDashboard();
                showNotification('Connexion réussie !');
                return true;

            } catch (error) {
                console.error('Erreur de connexion:', error);
                showNotification(error.message, 'error');
                return false;
            } finally {
                setLoading(loginBtn, false);
            }
        }

        async function signup(email, password, fullName) {
            const signupBtn = document.getElementById('signupBtn');
            setLoading(signupBtn, true);

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            username: email
                        }
                    }
                });

                if (error) {
                    throw error;
                }

                showNotification('Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
                showLoginPage();
                return true;

            } catch (error) {
                console.error('Erreur de création de compte:', error);
                showNotification(error.message, 'error');
                return false;
            } finally {
                setLoading(signupBtn, false);
            }
        }

        async function logout() {
            if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
                try {
                    const { error } = await supabase.auth.signOut();
                    if (error) throw error;
                    
                    currentUser = null;
                    currentTheme = null;
                    showLoginPage();
                    showNotification('Déconnexion réussie');
                } catch (error) {
                    console.error('Erreur de déconnexion:', error);
                    showNotification('Erreur lors de la déconnexion', 'error');
                }
            }
        }

        async function loadUserProfile() {
            if (!currentUser) return;

            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (error && error.code !== 'PGRST116') {
                    throw error;
                }

                if (data) {
                    document.getElementById('userInfo').textContent = `👤 ${data.full_name || data.username}`;
                } else {
                    document.getElementById('userInfo').textContent = `👤 ${currentUser.email}`;
                }
            } catch (error) {
                console.error('Erreur lors du chargement du profil:', error);
                document.getElementById('userInfo').textContent = `👤 ${currentUser.email}`;
            }
        }

        // Fonctions de navigation
        function showLoginPage() {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('signupPage').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        function showSignupPage() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('signupPage').classList.remove('hidden');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('signupForm').reset();
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('signupPage').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';
            showHome();
        }

        function showHome() {
            currentTheme = null;
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('themePage').classList.add('hidden');
            document.getElementById('breadcrumb').classList.add('hidden');
            document.getElementById('headerTitle').textContent = 'SAMSIC SÉCURITÉ';
            loadThemes();
        }

        function showTheme(themeId) {
            const theme = themes.find(t => t.id === themeId);
            
            if (!theme) return;
            
            currentTheme = themeId;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('themePage').classList.remove('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            
            document.getElementById('themePageTitle').textContent = theme.title;
            document.getElementById('headerTitle').textContent = theme.title;
            document.getElementById('breadcrumbContent').innerHTML = 
                `<a href="#" onclick="showHome()">Accueil</a> > ${theme.title}`;
            
            loadLinks(themeId);
        }
